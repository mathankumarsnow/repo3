app:
  name: "SampleApp"
  version: "1.0.0"
  environment: "development"
  debug: true

database:
  host: "localhost"
  port: 5432
  name: "sample_db"
  user: "admin"
  password: "${DB_PASSWORD}"
  pool_size: 10

server:
  host: "0.0.0.0"
  port: 3000
  timeout: 30
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"

logging:
  level: "info"
  format: "json"
  output: "stdout"

features:
  auth:
    enabled: true
    jwt_secret: "${JWT_SECRET}"
  cache:
    enabled: true
    ttl: 3600
  notifications:
    enabled: false
